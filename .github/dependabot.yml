version: 2
updates:
  # Gradle dependencies and plugin versions in build.gradle.kts
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Batch routine bumps into one PR to cut review noise.
      gradle-minor-and-patch:
        update-types:
          - minor
          - patch

  # The pinned action versions in .github/workflows/*.yml
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      github-actions:
        patterns:
          - "*"
